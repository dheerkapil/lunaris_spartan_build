name: Build Lunaris for spartan

on:
  workflow_dispatch:   # manual trigger from GitHub Actions tab

jobs:
  sync:
    name: Sync Source
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openjdk-11-jdk-headless git-core gnupg flex bison \
            gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 libncurses5-dev libssl-dev liblz4-tool x11proto-core-dev \
            libx11-dev libgl1-mesa-dev xsltproc unzip python-is-python3 imagemagick \
            pngcrush rsync bc libxml2-utils

      - name: Set up repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=lunaris-16.2-$(md5sum $GITHUB_WORKSPACE/local_manifest.xml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache Android source
        uses: actions/cache@v4
        with:
          path: ~/aosp
          key: ${{ steps.cache-key.outputs.key }}-sync

      - name: Init and sync source
        if: steps.cache-source.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/aosp
          cd ~/aosp
          repo init -u https://github.com/Lunaris-AOSP/android -b 16.2 --git-lfs --depth=1
          mkdir -p .repo/local_manifests
          cp $GITHUB_WORKSPACE/local_manifest.xml .repo/local_manifests/
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Update source (if cache existed)
        if: steps.cache-source.outputs.cache-hit == 'true'
        run: |
          cd ~/aosp
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

  build:
    name: Build ROM
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openjdk-11-jdk-headless git-core gnupg flex bison \
            gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev-i386 libncurses5-dev libssl-dev liblz4-tool x11proto-core-dev \
            libx11-dev libgl1-mesa-dev xsltproc unzip python-is-python3 imagemagick \
            pngcrush rsync bc libxml2-utils

      - name: Set up repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Generate cache key
        id: cache-key
        run: |
          echo "key=lunaris-16.2-$(md5sum $GITHUB_WORKSPACE/local_manifest.xml | cut -d ' ' -f1)" >> $GITHUB_OUTPUT

      - name: Restore cached source
        uses: actions/cache@v4
        with:
          path: ~/aosp
          key: ${{ steps.cache-key.outputs.key }}-sync

      - name: Quick sync (update if needed)
        run: |
          cd ~/aosp
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Set up build environment and lunch
        run: |
          cd ~/aosp
          . build/envsetup.sh
          lunch lineage_spartan-userdebug

      - name: Build ROM
        run: |
          cd ~/aosp
          make bacon -j$(nproc --all)

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lunaris-spartan-${{ github.run_id }}
          path: ~/aosp/out/target/product/spartan/*.zip
