name: Build AOSP

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install repo and git-lfs
        run: |
          # Install git-lfs (already present, but ensure it's there)
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-lfs

          # Install repo
          mkdir -p ~/.bin
          curl -sSL https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod +x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH   # Add to PATH for subsequent steps

      - name: Setup and sync AOSP
        run: |
          set -ex

          # Now repo is available
          mkdir -p ~/aosp
          cd ~/aosp
          repo init -u https://github.com/Lunaris-AOSP/android -b 16.2 --git-lfs

          mkdir -p .repo/local_manifests
          MANIFEST=".repo/local_manifests/local_manifest.xml"

          if [ -f "$GITHUB_WORKSPACE/local_manifest.xml" ]; then
            cp "$GITHUB_WORKSPACE/local_manifest.xml" "$MANIFEST"
            echo "📁 Copied user manifest"
          else
            echo "⚠️  No user manifest – creating default"
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<manifest>\n  <project name="Lunaris-AOSP/android" path="." revision="16.2" />\n</manifest>\n' > "$MANIFEST"
          fi

          # Remove BOM and CRLF
          sed -i '1s/^\xEF\xBB\xBF//' "$MANIFEST"
          sed -i 's/\r$//' "$MANIFEST"

          # Install xmllint if not present (usually is)
          sudo apt-get install -y -qq libxml2-utils || true

          # Validate; if invalid, replace with a working one
          if ! xmllint --noout "$MANIFEST" 2>/dev/null; then
            echo "❌ Manifest invalid – replacing with safe version"
            printf '<?xml version="1.0" encoding="UTF-8"?>\n<manifest>\n  <project name="Lunaris-AOSP/android" path="." revision="16.2" />\n</manifest>\n' > "$MANIFEST"
          else
            echo "✅ Manifest is valid"
          fi

          echo "--- Final manifest ---"
          cat "$MANIFEST"
          echo "----------------------"

          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags