- name: Setup and sync AOSP
  run: |
    set -e
    mkdir -p ~/aosp
    cd ~/aosp
    repo init -u https://github.com/Lunaris-AOSP/android -b 16.2 --git-lfs

    mkdir -p .repo/local_manifests

    # Copy manifest if it exists, otherwise create a default one
    if [ -f "$GITHUB_WORKSPACE/local_manifest.xml" ]; then
      cp "$GITHUB_WORKSPACE/local_manifest.xml" .repo/local_manifests/
    else
      echo "No local_manifest.xml found – creating a minimal one."
      cat > .repo/local_manifests/local_manifest.xml <<'EOF'
    <?xml version="1.0" encoding="UTF-8"?>
    <manifest>
      <!-- Add your projects here -->
    </manifest>
    EOF
    fi

    MANIFEST=".repo/local_manifests/local_manifest.xml"

    # Fix Byte Order Mark (BOM) and Windows line endings
    sed -i '1s/^\xEF\xBB\xBF//' "$MANIFEST"
    sed -i 's/\r$//' "$MANIFEST"          # remove CR

    # Validate XML – if invalid, try to repair
    if ! xmllint --noout "$MANIFEST" 2>/dev/null; then
      echo "❌ Invalid XML – attempting automatic repair..."

      # If root <manifest> is missing, add it
      if ! grep -q "<manifest" "$MANIFEST"; then
        sed -i '1i<?xml version="1.0" encoding="UTF-8"?>\n<manifest>' "$MANIFEST"
        echo "</manifest>" >> "$MANIFEST"
      fi

      # Escape unescaped ampersands
      sed -i 's/&\([^a-zA-Z#]\|$\)/\&amp;\1/g' "$MANIFEST"

      # Re-validate
      if ! xmllint --noout "$MANIFEST" 2>/dev/null; then
        echo "⚠️  Still invalid – using a safe fallback manifest."
        cat > "$MANIFEST" <<'EOF'
    <?xml version="1.0" encoding="UTF-8"?>
    <manifest>
      <project name="Lunaris-AOSP/android" path="." revision="16.2" />
    </manifest>
    EOF
      else
        echo "✅ Repaired successfully."
      fi
    else
      echo "✅ Manifest is valid."
    fi

    # Now sync
    repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags